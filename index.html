<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub</title>
    <!-- Logo -->
    <link rel="shortcut icon" href="./assets/github-logo-2.png" type="image/x-icon">
    <!-- Tailwind & daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS file-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <section id="signin-page" class="hidden">
        <div class="hero bg-base-200 min-h-screen">
            <div class="">

                <div class="card bg-base-100 max-w-[520px] shrink-0 shadow-2xl mx-auto p-8">
                    <div class="text-center">
                        <img class="mx-auto" src="./assets/github-logo.png" alt="logo">
                        <br>
                        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
                        <p class="text-lg text-[#64748B]">
                            Sign in to manage your issues
                        </p>
                    </div>
                    <div class="card-body">
                        <fieldset class="fieldset">
                            <label class="text-base">Username</label>
                            <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                            <label class="text-base">Password</label>
                            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                            <button onclick="signIn()" class="btn btn-primary mt-4 text-lg">Sign In</button>
                        </fieldset>
                        <div class="flex items-center my-4">
                            <div class="flex-1 border-t border-black/20"></div>
                            <span class="px-2">OR</span>
                            <div class="flex-1 border-t border-black/20"></div>
                        </div>
                        <div class="text-center">
                            <h5 class="text-base text-[#64748B]">Demo Credentials:</h5>
                            <div class="bg-[#F8FAFC] text-lg p-4 rounded-xl mt-2">
                                <span class="font-semibold">
                                    Username:
                                </span>
                                admin
                                <br>
                                <span class="font-semibold">
                                    Password:
                                </span>
                                admin123
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="md:flex-1">
                    <a class="btn btn-ghost"><img class="w-12 md:w-8" src="./assets/github-logo.png" alt="Logo">
                        <span class="hidden md:flex text-2xl">GitHub Issues
                            Tracker</span></a>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues here..." />
                    </label>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>
                        <span class="md:text-lg">New
                            Issue</span></button>
                </div>
            </div>
        </nav>
    </header>


    <script src="script.js"></script>
</body>

</html>
