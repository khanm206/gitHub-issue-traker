<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub</title>
    <!-- Logo -->
    <link rel="shortcut icon" href="./assets/github-logo-2.png" type="image/x-icon">
    <!-- Tailwind & daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS file-->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-[#F8FAFC] max-w-[1600px] mx-auto">

    <section id="signin-page" class="">
        <div class="hero bg-base-200 min-h-screen">
            <div class="">

                <div class="card bg-base-100 max-w-[520px] shrink-0 shadow-2xl mx-auto p-8">
                    <div class="text-center">
                        <img class="mx-auto" src="./assets/github-logo.png" alt="logo">
                        <br>
                        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
                        <p class="text-lg text-[#64748B]">
                            Sign in to manage your issues
                        </p>
                    </div>
                    <div class="card-body">
                        <fieldset class="fieldset">
                            <label class="text-base">Username</label>
                            <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                            <label class="text-base">Password</label>
                            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                            <button onclick="signIn()" class="btn btn-primary mt-4 text-lg">Sign In</button>
                        </fieldset>
                        <div class="flex items-center my-4">
                            <div class="flex-1 border-t border-black/20"></div>
                            <span class="px-2">OR</span>
                            <div class="flex-1 border-t border-black/20"></div>
                        </div>
                        <div class="text-center">
                            <h5 class="text-base text-[#64748B]">Demo Credentials:</h5>
                            <div class="bg-[#F8FAFC] text-lg p-4 rounded-xl mt-2">
                                <span class="font-semibold">
                                    Username:
                                </span>
                                admin
                                <br>
                                <span class="font-semibold">
                                    Password:
                                </span>
                                admin123
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <header class="after-signin hidden">
        <nav>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="md:flex-1">
                    <a onclick="loadIssue(`btn-all`)" class="btn btn-ghost"><img class="w-12 md:w-8"
                            src="./assets/github-logo.png" alt="Logo">
                        <span class="hidden md:flex text-2xl">GitHub Issues
                            Tracker</span></a>
                </div>
                <div class="flex gap-2">
                    <div class="join">
                        <div>
                            <label class="input join-item">

                                <input id="search" type="search" placeholder="Search here..." />
                            </label>
                        </div>
                        <button onclick="loadSearch()" class="btn btn-primary join-item">Search</button>
                    </div>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>
                        <span class="md:text-lg hidden md:flex">New
                            Issue</span></button>
                </div>
            </div>
        </nav>
    </header>

    <main class="after-signin hidden w-11/12 mx-auto">

        <section class="mt-8">
            <div class="bg-white p-8 rounded-xl space-x-4">
                <button id="btn-all" onclick="loadIssue(`btn-all`)"
                    class="issue-btn btn text-lg border-[#E4E4E7] text-[#64748B] hover:text-white hover:bg-primary hover:border-primary">All</button>
                <button id="btn-open" onclick="loadIssue(`btn-open`)"
                    class="issue-btn btn text-lg border-[#E4E4E7] text-[#64748B] hover:text-white hover:bg-primary hover:border-primary">Open</button>
                <button id="btn-closed" onclick="loadIssue(`btn-closed`)"
                    class="issue-btn btn text-lg border-[#E4E4E7] text-[#64748B] hover:text-white hover:bg-primary hover:border-primary">Closed</button>
            </div>
        </section>

        <section id="spinner" class="text-center my-20 hidden">
            <span class="loading loading-spinner loading-xl w-20"></span>
        </section>

        <section class="mt-8 need-loading bg-white rounded-xl p-8">
            <div class=" md:flex items-center justify-between">
                <div class="flex flex-row-reverse md:flex-row items-center gap-4">
                    <div class="bg-[#ECE4FF] p-2 rounded-full">
                        <img class="w-10" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="text-lg md:text-2xl font-semibold"><span id="issue-number"></span> Issue<span
                                id="plural-issue">s</span>
                        </h2>
                        <p class="text-[#64748B] text-lg">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-4 justify-center mt-4 md:mt-0">
                    <p><i class="fa-solid fa-circle fa-2xs" style="color: #00A96E;"></i> Open</p>
                    <p><i class="fa-solid fa-circle fa-2xs" style="color: #A855F7;"></i> Closed</p>
                </div>
            </div>
        </section>

        <section id="all-issue-container"
            class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 need-loading">


        </section>




        <dialog id="issueModal" class="modal">

        </dialog>


    </main>

    <footer class=" h-16"></footer>

    <script src="script.js"></script>
</body>

</html>
